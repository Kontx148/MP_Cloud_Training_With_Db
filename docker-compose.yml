services:
  api:
    build: .
    container_name: cars_api
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./:/app

  db:
    image: mysql:8.4
    container_name: cars_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: cars_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
